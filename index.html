<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ebe6dc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TaskFire">
<title>TaskFire</title>
<script>
// Inject manifest as blob URL so PWA install button appears
(function(){
  const manifest = {
    name: "TaskFire",
    short_name: "TaskFire",
    description: "Task reminder app with AI motivational quotes",
    start_url: "./",
    display: "standalone",
    background_color: "#ebe6dc",
    theme_color: "#ebe6dc",
    icons: [
      { src: "https://api.iconify.design/noto:fire.svg?width=192&height=192", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: "https://api.iconify.design/noto:fire.svg?width=512&height=512", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.currentScript.parentNode.appendChild(link);

  // Inline service worker
  const sw = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => clients.claim());
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('api.anthropic.com')) return;
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
    self.addEventListener('notificationclick', e => {
      e.notification.close();
      e.waitUntil(clients.matchAll({type:'window'}).then(list => {
        if (list.length) return list[0].focus();
        return clients.openWindow('/');
      }));
    });
  `;
  const swBlob = new Blob([sw], {type: 'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ebe6dc;
  --surface: #e3ddd3;
  --surface2: #dbd4c8;
  --border: #c5bba9;
  --border-light: #d8d0c4;
  --ink: #1a1410;
  --ink2: #2e261e;
  --amber: #8b6f47;
  --amber-light: #b8976a;
  --muted: #9a8f82;
  --muted2: #b5aa9c;
  --green: #3d6b4f;
  --green-bg: #dff0e6;
  --red: #7a2828;
  --red-bg: #f5e8e8;
  --yellow-bg: #f5f0dc;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; font-size:15px; }
body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9998; }

/* HEADER */
header { display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:60px; border-bottom:1px solid var(--border); background:rgba(235,230,220,0.96); backdrop-filter:blur(20px); position:sticky; top:0; z-index:200; gap:16px; }
.logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:600; color:var(--ink); flex-shrink:0; display:flex; align-items:center; gap:8px; }
.logo-fire { font-style:italic; color:var(--amber); }
.logo-badge { background:var(--red); color:#fff; font-family:'DM Mono',monospace; font-size:0.55rem; padding:2px 7px; border-radius:2px; letter-spacing:0.06em; display:none; }
.logo-badge.show { display:inline-block; }
.header-mid { display:flex; align-items:center; gap:7px; font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
.pdot { width:7px; height:7px; border-radius:50%; background:var(--muted2); flex-shrink:0; }
.pdot.on { background:var(--green); animation:pulsering 2s infinite; }
@keyframes pulsering { 0%{box-shadow:0 0 0 0 rgba(61,107,79,0.5)} 70%{box-shadow:0 0 0 5px rgba(61,107,79,0)} 100%{box-shadow:0 0 0 0 rgba(61,107,79,0)} }
.hactions { display:flex; align-items:center; gap:8px; }
.hbtn { display:flex; align-items:center; gap:5px; background:transparent; border:1px solid var(--border); color:var(--ink2); padding:6px 12px; font-family:'DM Mono',monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.hbtn:hover { background:var(--surface2); border-color:var(--amber); color:var(--amber); }
.hbtn.primary { background:var(--ink); color:var(--bg); border-color:var(--ink); }
.hbtn.primary:hover { background:var(--amber); border-color:var(--amber); }
.hbtn.hidden { display:none; }

/* PROGRESS BAR */
.prog-wrap { position:sticky; top:60px; z-index:199; height:3px; background:var(--border-light); }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--amber),var(--green)); transition:width 0.6s cubic-bezier(0.4,0,0.2,1); width:0%; }

/* INSTALL STRIP */
#installStrip { display:none; align-items:center; justify-content:space-between; padding:9px 32px; background:var(--ink); color:var(--bg); font-family:'DM Mono',monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; gap:12px; }
#installStrip.show { display:flex; }
#installStrip button { background:var(--amber); border:none; color:#fff; padding:5px 14px; font-family:'DM Mono',monospace; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.1em; cursor:pointer; transition:opacity 0.15s; }
#installStrip button:hover { opacity:0.85; }
.dismiss-strip { background:transparent !important; color:rgba(235,230,220,0.35) !important; padding:5px !important; }

/* LAYOUT */
.layout { display:grid; grid-template-columns:216px 1fr; min-height:calc(100vh - 63px); }

/* SIDEBAR */
.sidebar { border-right:1px solid var(--border); padding:24px 0 40px; background:rgba(227,221,211,0.5); position:sticky; top:63px; height:calc(100vh - 63px); overflow-y:auto; }
.sb-label { font-family:'DM Mono',monospace; font-size:0.54rem; text-transform:uppercase; letter-spacing:0.2em; color:var(--muted2); padding:0 18px; margin-bottom:3px; }
.navitem { display:flex; align-items:center; justify-content:space-between; padding:9px 18px; cursor:pointer; font-size:0.86rem; color:var(--ink2); transition:all 0.12s; border-left:3px solid transparent; }
.navitem:hover { background:var(--surface2); }
.navitem.on { background:var(--surface2); border-left-color:var(--amber); color:var(--ink); font-weight:500; }
.navleft { display:flex; align-items:center; gap:9px; }
.navicon { font-size:0.85rem; width:18px; text-align:center; }
.navcnt { font-family:'DM Mono',monospace; font-size:0.56rem; background:var(--border); color:var(--muted); padding:1px 6px; border-radius:10px; min-width:18px; text-align:center; }
.navcnt.red { background:var(--red-bg); color:var(--red); }
.sbdiv { height:1px; background:var(--border-light); margin:10px 18px; }
.prifilter { padding:4px 18px; }
.pfitem { display:flex; align-items:center; gap:8px; padding:6px 8px; cursor:pointer; font-size:0.82rem; color:var(--ink2); border-radius:2px; transition:background 0.12s; }
.pfitem:hover { background:var(--surface2); }
.pfitem.on { background:var(--surface2); font-weight:500; }
.pfdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sb-stats { padding:14px 18px 0; }
.day-prog { background:var(--surface2); padding:14px; border:1px solid var(--border-light); }
.dp-lbl { font-family:'DM Mono',monospace; font-size:0.56rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:8px; }
.dp-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:6px; }
.dp-fill { height:100%; background:linear-gradient(90deg,var(--amber),var(--green)); border-radius:2px; transition:width 0.5s ease; width:0%; }
.dp-nums { font-family:'DM Mono',monospace; font-size:0.6rem; color:var(--muted); display:flex; justify-content:space-between; }

/* CONTENT */
.content { padding:28px 36px 80px; }

/* QUICK ADD */
.quickadd { background:var(--surface); border:1px solid var(--border); margin-bottom:28px; transition:border-color 0.2s,box-shadow 0.2s; }
.quickadd:focus-within { border-color:var(--amber); box-shadow:0 2px 20px rgba(139,111,71,0.1); }
.qa-row1 { display:flex; align-items:center; }
.qa-input { flex:1; background:transparent; border:none; padding:15px 18px; font-family:'DM Sans',sans-serif; font-size:0.94rem; color:var(--ink); outline:none; }
.qa-input::placeholder { color:var(--muted2); }
.qa-addbtn { background:var(--ink); border:none; color:var(--bg); padding:9px 22px; margin:8px 10px; font-family:'Playfair Display',serif; font-size:0.85rem; font-style:italic; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.qa-addbtn:hover { background:var(--amber); }
.qa-row2 { display:flex; align-items:center; border-top:1px solid var(--border-light); padding:0 8px; overflow-x:auto; }
.qafield { display:flex; align-items:center; gap:6px; padding:7px 10px; border-right:1px solid var(--border-light); flex-shrink:0; }
.qafield label { font-family:'DM Mono',monospace; font-size:0.56rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); white-space:nowrap; cursor:default; }
.qafield input,.qafield select { background:transparent; border:none; color:var(--ink2); font-family:'DM Mono',monospace; font-size:0.7rem; outline:none; cursor:pointer; padding:0; }
.qafield select { appearance:none; }

/* VIEW HEADER */
.viewhdr { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px; gap:16px; flex-wrap:wrap; }
.viewtitle { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:600; color:var(--ink); display:flex; align-items:baseline; gap:10px; }
.viewcnt { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); font-weight:400; }
.vcontrols { display:flex; align-items:center; gap:8px; }
.sort-sel { background:var(--surface); border:1px solid var(--border); color:var(--ink2); padding:6px 10px; font-family:'DM Mono',monospace; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.08em; outline:none; cursor:pointer; }
.cdchip { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border); padding:5px 10px; font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap; }
.cdchip span { color:var(--amber); font-weight:500; }

/* TASK GROUP */
.tgroup { margin-bottom:22px; }
.tgroup-lbl { font-family:'DM Mono',monospace; font-size:0.56rem; text-transform:uppercase; letter-spacing:0.16em; color:var(--muted2); padding-bottom:8px; border-bottom:1px solid var(--border-light); margin-bottom:1px; }

/* TASK ITEM */
.titem { background:var(--surface); border-left:3px solid var(--border-light); display:grid; grid-template-columns:38px 1fr auto; align-items:start; transition:background 0.12s,opacity 0.3s; margin-bottom:1px; }
.titem:hover { background:var(--surface2); }
.titem.active { border-left-color:var(--amber-light); }
.titem.overdue { border-left-color:var(--red); background:#fdf8f8; }
.titem.done { border-left-color:var(--green); opacity:0.5; }
.titem.flash { animation:cflash 0.4s ease forwards; }
@keyframes cflash { 0%{background:var(--surface)} 35%{background:var(--green-bg)} 100%{background:var(--surface)} }
.tchk-col { display:flex; align-items:flex-start; justify-content:center; padding-top:16px; }
.chkring { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; }
.chkring:hover { border-color:var(--green); background:var(--green-bg); }
.chkring.done-r { background:var(--green); border-color:var(--green); }
.chkring.done-r::after { content:''; width:5px; height:8px; border:1.5px solid #fff; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); display:block; }
.tbody { padding:13px 0; min-width:0; }
.tname { font-size:0.9rem; color:var(--ink); line-height:1.4; margin-bottom:5px; word-break:break-word; }
.titem.done .tname { text-decoration:line-through; color:var(--muted); }
.tchips { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.chip { display:inline-flex; align-items:center; gap:3px; font-family:'DM Mono',monospace; font-size:0.56rem; padding:2px 7px; border-radius:2px; text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
.c-date { background:var(--surface2); color:var(--muted); border:1px solid var(--border-light); }
.c-ov { background:var(--red-bg); color:var(--red); border:1px solid #e0c0c0; }
.c-tod { background:var(--yellow-bg); color:#7a6020; border:1px solid #e0d090; }
.c-hi { background:var(--red-bg); color:var(--red); border:1px solid #e0c0c0; }
.c-med { background:var(--yellow-bg); color:#7a6020; border:1px solid #e0d090; }
.c-lo { background:var(--surface2); color:var(--muted); border:1px solid var(--border-light); }
.tside { display:flex; align-items:center; padding:13px 10px 13px 4px; gap:2px; opacity:0; transition:opacity 0.15s; }
.titem:hover .tside { opacity:1; }
.ibtn { background:transparent; border:none; color:var(--muted2); cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:2px; font-size:0.78rem; transition:all 0.13s; }
.ibtn:hover { background:var(--border); color:var(--ink2); }
.ibtn.del:hover { background:var(--red-bg); color:var(--red); }

/* EMPTY */
.empty { text-align:center; padding:60px 32px; border:1px dashed var(--border); }
.empty-ico { font-size:2.4rem; margin-bottom:12px; opacity:0.3; }
.empty-t { font-family:'Playfair Display',serif; font-size:1.05rem; font-style:italic; color:var(--muted); margin-bottom:6px; }
.empty-s { font-family:'DM Mono',monospace; font-size:0.58rem; text-transform:uppercase; letter-spacing:0.14em; color:var(--muted2); }

/* TOAST */
#toast { position:fixed; bottom:24px; right:24px; width:336px; background:var(--ink); z-index:9999; transform:translateY(120%) scale(0.96); transition:transform 0.38s cubic-bezier(0.16,1,0.3,1),opacity 0.38s; opacity:0; overflow:hidden; box-shadow:0 16px 48px rgba(26,20,16,0.3); }
#toast.visible { transform:translateY(0) scale(1); opacity:1; }
.t-top { display:flex; align-items:center; justify-content:space-between; padding:13px 15px 10px; border-bottom:1px solid rgba(255,255,255,0.09); }
.t-eyebrow { font-family:'DM Mono',monospace; font-size:0.56rem; text-transform:uppercase; letter-spacing:0.18em; color:var(--amber-light); }
.t-x { background:none; border:none; color:rgba(235,230,220,0.35); cursor:pointer; font-size:0.88rem; padding:2px 4px; line-height:1; transition:color 0.13s; }
.t-x:hover { color:var(--bg); }
.t-tasks { padding:11px 15px; }
.t-trow { margin-bottom:8px; }
.t-trow:last-child { margin-bottom:0; }
.t-tname { font-family:'Playfair Display',serif; font-size:0.88rem; color:var(--bg); margin-bottom:2px; }
.t-tsub { font-family:'DM Mono',monospace; font-size:0.56rem; color:rgba(235,230,220,0.4); text-transform:uppercase; letter-spacing:0.07em; }
.t-qwrap { padding:11px 15px 15px; border-top:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.03); }
.t-q { font-family:'Playfair Display',serif; font-size:0.8rem; font-style:italic; line-height:1.6; color:rgba(235,230,220,0.88); min-height:36px; }
.t-ql { font-family:'DM Mono',monospace; font-size:0.56rem; text-transform:uppercase; letter-spacing:0.12em; color:rgba(235,230,220,0.28); font-style:normal; animation:fpulse 1.4s infinite; }
@keyframes fpulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.t-author { font-family:'DM Mono',monospace; font-size:0.56rem; color:var(--amber-light); text-transform:uppercase; letter-spacing:0.1em; margin-top:6px; }

/* SNACKBAR */
#snack { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--ink2); color:var(--bg); padding:9px 18px; font-family:'DM Mono',monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; opacity:0; transition:all 0.25s; pointer-events:none; white-space:nowrap; z-index:9997; }
#snack.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width:680px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .content { padding:18px 16px 80px; }
  header { padding:0 16px; }
  #toast { width:calc(100vw - 28px); right:14px; bottom:14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Task<span class="logo-fire">Fire</span><span class="logo-badge" id="ovBadge">0 overdue</span></div>
  <div class="header-mid"><div class="pdot" id="ndot"></div><span id="nlbl">Reminders off</span></div>
  <div class="hactions">
    <button class="hbtn" id="enableBtn" onclick="reqNotifs()">🔔 Enable Reminders</button>
    <button class="hbtn hidden" id="installBtn" onclick="installPWA()">📲 Install App</button>
  </div>
</header>
<div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>

<div id="installStrip">
  <span>📲 Install TaskFire as a desktop app — notifications fire even when minimized</span>
  <div style="display:flex;gap:8px">
    <button onclick="installPWA()">Install now</button>
    <button class="dismiss-strip" onclick="dismissStrip()">✕</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div style="margin-bottom:6px">
      <div class="sb-label">Views</div>
      <div class="navitem on" onclick="setView('today',this)"><div class="navleft"><span class="navicon">☀️</span>Today</div><span class="navcnt" id="nc-today">0</span></div>
      <div class="navitem" onclick="setView('upcoming',this)"><div class="navleft"><span class="navicon">📅</span>Upcoming</div><span class="navcnt" id="nc-upcoming">0</span></div>
      <div class="navitem" onclick="setView('all',this)"><div class="navleft"><span class="navicon">📋</span>All Tasks</div><span class="navcnt" id="nc-all">0</span></div>
      <div class="navitem" onclick="setView('done',this)"><div class="navleft"><span class="navicon">✅</span>Completed</div><span class="navcnt" id="nc-done">0</span></div>
      <div class="navitem" onclick="setView('overdue',this)"><div class="navleft"><span class="navicon">⚠️</span>Overdue</div><span class="navcnt red" id="nc-overdue">0</span></div>
    </div>
    <div class="sbdiv"></div>
    <div style="margin-bottom:6px">
      <div class="sb-label">Priority</div>
      <div class="prifilter">
        <div class="pfitem on" onclick="setPri('all',this)"><div class="pfdot" style="background:var(--border)"></div>All</div>
        <div class="pfitem" onclick="setPri('high',this)"><div class="pfdot" style="background:var(--red)"></div>High</div>
        <div class="pfitem" onclick="setPri('medium',this)"><div class="pfdot" style="background:#c8a84b"></div>Medium</div>
        <div class="pfitem" onclick="setPri('low',this)"><div class="pfdot" style="background:var(--muted2)"></div>Low</div>
      </div>
    </div>
    <div class="sbdiv"></div>
    <div class="sb-stats">
      <div class="day-prog">
        <div class="dp-lbl">Today's progress</div>
        <div class="dp-bar"><div class="dp-fill" id="dpFill"></div></div>
        <div class="dp-nums"><span id="dpDone">0 done</span><span id="dpLeft">0 left</span></div>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="quickadd">
      <div class="qa-row1">
        <input class="qa-input" id="tName" type="text" placeholder="Add a task… (press N to focus)" />
        <button class="qa-addbtn" onclick="addTask()">Add</button>
      </div>
      <div class="qa-row2">
        <div class="qafield"><label>Date</label><input type="date" id="tDate"/></div>
        <div class="qafield"><label>Time</label><input type="time" id="tTime"/></div>
        <div class="qafield"><label>Priority</label>
          <select id="tPri">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
    </div>

    <div class="viewhdr">
      <div class="viewtitle"><span id="vTitle">Today</span><span class="viewcnt" id="vCnt"></span></div>
      <div class="vcontrols">
        <div class="cdchip" id="cdChip" style="display:none">🔔 <span id="cdTime">--:--</span></div>
        <select class="sort-sel" id="sortSel" onchange="render()">
          <option value="priority">Sort: Priority</option>
          <option value="due">Sort: Due Date</option>
          <option value="created">Sort: Created</option>
          <option value="alpha">Sort: A–Z</option>
        </select>
      </div>
    </div>

    <div id="taskList"></div>
  </main>
</div>

<div id="toast">
  <div class="t-top"><div class="t-eyebrow" id="tEyebrow">⚡ Reminder</div><button class="t-x" onclick="closeToast()">✕</button></div>
  <div class="t-tasks" id="tTasks"></div>
  <div class="t-qwrap"><div class="t-q" id="tQ"><span class="t-ql">Generating quote...</span></div><div class="t-author" id="tAuthor"></div></div>
</div>
<div id="snack"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────
const API_KEY = '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';
const INTERVAL = 30 * 60 * 1000; // 30 minutes

// ── STATE ──────────────────────────────────────────────────────────
let tasks=[], view='today', priF='all', dP=null, nextFire=null, loopT=null, cdT=null;

// ── STORAGE ────────────────────────────────────────────────────────
function load(){ try{ tasks=JSON.parse(localStorage.getItem('tf3')||'[]'); }catch(e){ tasks=[]; } }
function save(){ localStorage.setItem('tf3', JSON.stringify(tasks)); }

// ── PWA INSTALL ────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); dP = e;
  if (!localStorage.getItem('tf_sd')) document.getElementById('installStrip').classList.add('show');
  document.getElementById('installBtn').classList.remove('hidden');
});
function installPWA(){
  if (!dP) { snack('Open this site in Chrome or Edge to install.'); return; }
  dP.prompt();
  dP.userChoice.then(() => {
    dP = null;
    document.getElementById('installStrip').classList.remove('show');
    document.getElementById('installBtn').classList.add('hidden');
  });
}
function dismissStrip(){ localStorage.setItem('tf_sd','1'); document.getElementById('installStrip').classList.remove('show'); }
window.addEventListener('appinstalled', () => {
  document.getElementById('installStrip').classList.remove('show');
  snack('App installed! Launch from your desktop anytime.');
});

// ── NOTIFICATIONS ──────────────────────────────────────────────────
function checkPerm(){ if (Notification.permission === 'granted') activateNotifs(); }
function reqNotifs(){
  Notification.requestPermission().then(p => {
    if (p === 'granted'){ activateNotifs(); startLoop(); setTimeout(fireReminder, 2000); }
    else snack('Notifications blocked — enable in browser settings.');
  });
}
function activateNotifs(){
  document.getElementById('ndot').className = 'pdot on';
  document.getElementById('nlbl').textContent = 'Reminders on';
  document.getElementById('enableBtn').classList.add('hidden');
  document.getElementById('cdChip').style.display = 'flex';
  if (!loopT) startLoop();
}
function startLoop(){
  if (loopT) clearInterval(loopT);
  if (cdT) clearInterval(cdT);
  nextFire = Date.now() + INTERVAL;
  loopT = setInterval(() => { nextFire = Date.now() + INTERVAL; fireReminder(); }, INTERVAL);
  cdT = setInterval(tickCD, 1000);
}
function tickCD(){
  if (!nextFire) return;
  const d = Math.max(0, nextFire - Date.now());
  document.getElementById('cdTime').textContent =
    String(Math.floor(d/60000)).padStart(2,'0') + ':' +
    String(Math.floor((d%60000)/1000)).padStart(2,'0');
}
async function fireReminder(){
  const pend = tasks.filter(t => !t.done);
  if (!pend.length) return;
  const sorted = [...pend].sort((a,b) => {
    const p = {high:0,medium:1,low:2};
    if (p[a.priority] !== p[b.priority]) return p[a.priority] - p[b.priority];
    return (a.dueDate||'z').localeCompare(b.dueDate||'z');
  });
  const top = sorted.slice(0, 3);
  showToast(top);
  const q = await getQuote(top[0]);
  updateTQ(q);
  if (Notification.permission === 'granted'){
    try {
      new Notification('TaskFire — ' + pend.length + ' pending', {
        body: top.map(t => '• ' + t.name).join('\n'),
        icon: 'https://api.iconify.design/noto:fire.svg',
        tag: 'tf-r',
        silent: false
      });
    } catch(e){}
  }
}
function showToast(list){
  document.getElementById('tEyebrow').textContent = '⚡ ' + list.length + ' task' + (list.length>1?'s':'') + ' need attention';
  document.getElementById('tTasks').innerHTML = list.map(t =>
    `<div class="t-trow">
      <div class="t-tname">${esc(t.name)}</div>
      <div class="t-tsub">${t.dueDate ? fmtD(t.dueDate) : 'No deadline'}${t.dueTime?' · '+t.dueTime:''} · ${t.priority} priority</div>
    </div>`
  ).join('');
  document.getElementById('tQ').innerHTML = '<span class="t-ql">Generating quote...</span>';
  document.getElementById('tAuthor').textContent = '';
  document.getElementById('toast').classList.add('visible');
  setTimeout(closeToast, 20000);
}
function updateTQ(q){
  document.getElementById('tQ').textContent = '\u201c' + q.text + '\u201d';
  document.getElementById('tAuthor').textContent = q.author ? '— ' + q.author : '';
}
function closeToast(){ document.getElementById('toast').classList.remove('visible'); }

// ── CLAUDE API (direct) ────────────────────────────────────────────
async function getQuote(task){
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        system: 'You are a sharp motivational coach. Write ONE punchy original quote (max 2 sentences) tied directly to the task. End with "— [name]". Return ONLY the quote and attribution, nothing else.',
        messages: [{ role: 'user', content: `Task: "${task.name}". Priority: ${task.priority}. Write a motivational quote for this task.` }]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || '').trim();
    const dash = raw.lastIndexOf('—');
    if (dash > 0) return { text: raw.slice(0, dash).trim().replace(/^"|"$/g,''), author: raw.slice(dash+1).trim() };
    return { text: raw.replace(/^"|"$/g,''), author: 'Claude' };
  } catch(e){
    return { text: 'Every task you finish is proof of capability. Ship it.', author: 'TaskFire' };
  }
}

// ── TASKS CRUD ─────────────────────────────────────────────────────
function addTask(){
  const name = document.getElementById('tName').value.trim();
  if (!name){ document.getElementById('tName').focus(); snack('Enter a task name first.'); return; }
  tasks.unshift({
    id: Date.now().toString(),
    name,
    dueDate: document.getElementById('tDate').value,
    dueTime: document.getElementById('tTime').value,
    priority: document.getElementById('tPri').value,
    done: false,
    created: new Date().toISOString()
  });
  save(); render(); updateCounts();
  document.getElementById('tName').value = '';
  document.getElementById('tTime').value = '';
  snack('Task added.');
}
function toggle(id){
  const t = tasks.find(x => x.id === id); if (!t) return;
  const el = document.getElementById('ti-'+id);
  if (!t.done){
    if (el){ el.classList.add('flash'); setTimeout(() => { t.done=true; t.doneAt=new Date().toISOString(); save(); render(); updateCounts(); snack('Done ✓'); }, 380); }
    else { t.done=true; save(); render(); updateCounts(); }
  } else { t.done=false; t.doneAt=null; save(); render(); updateCounts(); }
}
function del(id){ tasks=tasks.filter(x=>x.id!==id); save(); render(); updateCounts(); snack('Removed.'); }

// ── VIEWS & FILTERS ────────────────────────────────────────────────
function setView(v, el){ view=v; document.querySelectorAll('.navitem').forEach(n=>n.classList.remove('on')); el.classList.add('on'); render(); }
function setPri(p, el){ priF=p; document.querySelectorAll('.pfitem').forEach(n=>n.classList.remove('on')); el.classList.add('on'); render(); }

function getList(){
  const today = new Date().toISOString().split('T')[0];
  let list;
  if (view==='today')    list = tasks.filter(t => !t.done && (t.dueDate===today || !t.dueDate || isOv(t)));
  else if (view==='upcoming') list = tasks.filter(t => !t.done && t.dueDate && t.dueDate>today);
  else if (view==='overdue')  list = tasks.filter(t => isOv(t));
  else if (view==='done')     list = tasks.filter(t => t.done);
  else                        list = tasks.filter(t => !t.done);
  if (priF !== 'all') list = list.filter(t => t.priority === priF);
  return list;
}
function sortList(list){
  const s = document.getElementById('sortSel').value;
  const p = {high:0,medium:1,low:2};
  return [...list].sort((a,b) => {
    if (s==='priority'){ if(p[a.priority]!==p[b.priority]) return p[a.priority]-p[b.priority]; return (a.dueDate||'z').localeCompare(b.dueDate||'z'); }
    if (s==='due'){ if(!a.dueDate&&!b.dueDate) return 0; if(!a.dueDate) return 1; if(!b.dueDate) return -1; return a.dueDate.localeCompare(b.dueDate); }
    if (s==='alpha') return a.name.localeCompare(b.name);
    return new Date(b.created) - new Date(a.created);
  });
}

// ── RENDER ─────────────────────────────────────────────────────────
function isOv(t){ if(t.done||!t.dueDate) return false; return new Date(t.dueDate+(t.dueTime?'T'+t.dueTime:'T23:59'))<new Date(); }
function isToday(t){ return t.dueDate===new Date().toISOString().split('T')[0]; }
const VT = {today:'Today',upcoming:'Upcoming',all:'All Tasks',done:'Completed',overdue:'Overdue'};

function render(){
  const list = sortList(getList());
  document.getElementById('vTitle').textContent = VT[view]||'Tasks';
  document.getElementById('vCnt').textContent = list.length ? list.length+' task'+(list.length>1?'s':'') : '';
  const el = document.getElementById('taskList');
  if (!list.length){
    const M = {
      today:   {i:'☀️', t:'All clear for today',      s:'Add something above or check upcoming tasks'},
      upcoming:{i:'📅', t:'Nothing upcoming',          s:'Tasks with future dates appear here'},
      overdue: {i:'✅', t:'No overdue tasks',           s:"You're fully on top of things"},
      done:    {i:'🏆', t:'Nothing completed yet',      s:'Finish your first task to see it here'},
      all:     {i:'📋', t:'No active tasks',            s:'Add your first task above'}
    };
    const m = M[view]||M.all;
    el.innerHTML = `<div class="empty"><div class="empty-ico">${m.i}</div><div class="empty-t">${m.t}</div><div class="empty-s">${m.s}</div></div>`;
    return;
  }
  if (view==='today'||view==='all'){
    const ov=list.filter(t=>isOv(t)), tod=list.filter(t=>!isOv(t)&&isToday(t)), rest=list.filter(t=>!isOv(t)&&!isToday(t));
    let h='';
    if (ov.length)   h += renderGroup('⚠ Overdue', ov);
    if (tod.length)  h += renderGroup('Due Today', tod);
    if (rest.length) h += renderGroup(view==='today'?'No Deadline':'No Due Date', rest);
    el.innerHTML = h;
  } else {
    el.innerHTML = list.map(renderTask).join('');
  }
  updateProg();
}
function renderGroup(lbl, items){ return `<div class="tgroup"><div class="tgroup-lbl">${lbl}</div>${items.map(renderTask).join('')}</div>`; }
function renderTask(t){
  const ov=isOv(t), tod=isToday(t), cls=t.done?'done':ov?'overdue':'active';
  let chips='';
  if (t.dueDate){
    if (ov)        chips += `<span class="chip c-ov">⚠ Overdue · ${fmtD(t.dueDate)}</span>`;
    else if (tod)  chips += `<span class="chip c-tod">Today${t.dueTime?' · '+t.dueTime:''}</span>`;
    else           chips += `<span class="chip c-date">📅 ${fmtD(t.dueDate)}${t.dueTime?' · '+t.dueTime:''}</span>`;
  }
  if (t.priority==='high')        chips += `<span class="chip c-hi">High</span>`;
  else if (t.priority==='medium') chips += `<span class="chip c-med">Med</span>`;
  else                            chips += `<span class="chip c-lo">Low</span>`;
  return `<div class="titem ${cls}" id="ti-${t.id}">
    <div class="tchk-col"><div class="chkring ${t.done?'done-r':''}" onclick="toggle('${t.id}')"></div></div>
    <div class="tbody"><div class="tname">${esc(t.name)}</div><div class="tchips">${chips}</div></div>
    <div class="tside"><button class="ibtn del" onclick="del('${t.id}')" title="Delete">✕</button></div>
  </div>`;
}

function updateCounts(){
  const today=new Date().toISOString().split('T')[0];
  const ov=tasks.filter(t=>isOv(t));
  document.getElementById('nc-today').textContent    = tasks.filter(t=>!t.done&&(t.dueDate===today||!t.dueDate||isOv(t))).length;
  document.getElementById('nc-upcoming').textContent = tasks.filter(t=>!t.done&&t.dueDate&&t.dueDate>today).length;
  document.getElementById('nc-all').textContent      = tasks.filter(t=>!t.done).length;
  document.getElementById('nc-done').textContent     = tasks.filter(t=>t.done).length;
  document.getElementById('nc-overdue').textContent  = ov.length;
  const badge = document.getElementById('ovBadge');
  if (ov.length){ badge.textContent=ov.length+' overdue'; badge.classList.add('show'); } else badge.classList.remove('show');
  updateProg();
}
function updateProg(){
  const total=tasks.length, done=tasks.filter(t=>t.done).length;
  document.getElementById('progFill').style.width = (total ? Math.round(done/total*100) : 0)+'%';
  const left=tasks.filter(t=>!t.done).length, tdone=tasks.filter(t=>t.done).length;
  const pct = tdone+left ? Math.round(tdone/(tdone+left)*100) : 0;
  document.getElementById('dpFill').style.width = pct+'%';
  document.getElementById('dpDone').textContent = tdone+' done';
  document.getElementById('dpLeft').textContent = left+' left';
}

// ── HELPERS ────────────────────────────────────────────────────────
function snack(msg){
  const el=document.getElementById('snack'); el.textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800);
}
function fmtD(s){
  if (!s) return '';
  const d=new Date(s+'T00:00'), t=new Date(), tm=new Date(t); tm.setDate(t.getDate()+1);
  if (s===t.toISOString().split('T')[0]) return 'Today';
  if (s===tm.toISOString().split('T')[0]) return 'Tomorrow';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── KEYBOARD ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA'){
    if (e.key==='Enter' && document.activeElement.id==='tName') addTask();
    if (e.key==='Escape') document.activeElement.blur();
    return;
  }
  if (e.key==='n'||e.key==='N'){ e.preventDefault(); document.getElementById('tName').focus(); }
});

// ── INIT ───────────────────────────────────────────────────────────
load();
document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
render(); updateCounts(); checkPerm();
if (Notification.permission==='granted'){ startLoop(); setTimeout(fireReminder, 2500); }
</script>
</body>
</html>
