<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ebe6dc">
<meta name="description" content="Task reminder app with AI-powered motivational quotes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TaskFire">
<link rel="manifest" href="manifest.json">
<title>TASKFIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ebe6dc;
    --surface: #e4ddd2;
    --surface2: #ddd6ca;
    --border: #c8bfb0;
    --accent: #2a2118;
    --accent2: #8b6f47;
    --text: #1a1410;
    --muted: #9a8f82;
    --green: #3d6b4f;
    --red: #8b2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(235,230,220,0.94);
    backdrop-filter: blur(16px);
    z-index: 100;
    gap: 16px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    flex-shrink: 0;
  }
  .logo span { color: var(--accent2); font-style: italic; }

  .header-center {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .dot.active {
    background: var(--green);
    box-shadow: 0 0 6px rgba(61,107,79,0.5);
    animation: blink 2.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .btn-outline:hover { background: var(--accent); color: var(--bg); }
  .btn-outline.hidden { display: none; }

  /* ── INSTALL BANNER ── */
  #installBanner {
    display: none;
    background: var(--accent);
    color: var(--bg);
    padding: 10px 36px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  #installBanner.show { display: flex; }
  #installBanner button {
    background: var(--bg);
    color: var(--accent);
    border: none;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    white-space: nowrap;
  }
  #installBanner .dismiss { background: transparent; color: rgba(235,230,220,0.5); }

  /* ── MAIN ── */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 36px 80px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 14px;
  }



  /* ── ADD FORM ── */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 36px;
    position: relative;
  }
  .add-form::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent2);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-group { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  input[type="text"],
  input[type="time"],
  input[type="date"],
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.18s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  input::placeholder { color: var(--muted); }
  select { cursor: pointer; }
  select option { background: var(--surface2); }

  .task-name-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 12px;
  }

  .add-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    padding: 11px 28px;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-style: italic;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .add-btn:hover { background: var(--accent2); transform: translateY(-1px); }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    line-height: 1;
    font-weight: 600;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  /* ── TASKS HEADER ── */
  .tasks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .right-controls { display: flex; align-items: center; gap: 12px; }

  .next-reminder {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .next-reminder span { color: var(--accent2); font-weight: 500; }

  .filter-tabs { display: flex; border: 1px solid var(--border); }
  .ftab {
    padding: 6px 13px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ftab.active { background: var(--accent); color: var(--bg); }

  /* ── TASK LIST ── */
  .task-list { display: flex; flex-direction: column; gap: 1px; }

  .task-item {
    background: var(--surface);
    border-left: 3px solid transparent;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 26px 1fr auto;
    gap: 14px;
    align-items: center;
    transition: background 0.15s;
    animation: slideIn 0.28s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
  .task-item:hover { background: var(--surface2); }
  .task-item.active { border-left-color: var(--accent2); }
  .task-item.done { border-left-color: var(--green); opacity: 0.5; }
  .task-item.overdue { border-left-color: var(--red); }

  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
    border-radius: 2px;
  }
  .check-box:hover { border-color: var(--green); }
  .check-box.checked { background: var(--green); border-color: var(--green); }
  .check-box.checked::after { content: '✓'; color: var(--bg); font-size: 0.68rem; font-weight: 700; }

  .task-info { min-width: 0; }
  .task-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); font-style: italic; }

  .task-meta {
    display: flex;
    gap: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    flex-wrap: wrap;
  }

  .task-actions { display: flex; gap: 8px; align-items: center; }

  .priority-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .priority-tag.high { border-color: var(--red); color: var(--red); }
  .priority-tag.medium { border-color: var(--accent2); color: var(--accent2); }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 6px;
    transition: color 0.15s;
    line-height: 1;
  }
  .del-btn:hover { color: var(--red); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 32px;
    border: 1px dashed var(--border);
    color: var(--muted);
  }
  .empty-big {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-style: italic;
    color: var(--border);
    display: block;
    margin-bottom: 8px;
  }
  .empty p { font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.14em; }

  /* ── NOTIFICATION TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 350px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    padding: 20px 22px;
    z-index: 9999;
    transform: translateX(420px);
    transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 8px 40px rgba(26,20,16,0.18);
  }
  #toast.visible { transform: translateX(0); }

  .toast-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .toast-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent2);
  }
  .toast-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 0.9rem; line-height: 1;
    padding: 2px 4px;
  }
  .toast-close:hover { color: var(--text); }

  .toast-task { margin-bottom: 10px; }
  .toast-task-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 2px;
  }
  .toast-task-due {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .toast-quote {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    line-height: 1.6;
    font-style: italic;
    color: var(--text);
    min-height: 42px;
  }
  .toast-author {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
  }
  .toast-loading {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-style: normal;
    animation: blink 1.2s infinite;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 14px 18px; }
    .main { padding: 24px 18px 60px; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    #toast { width: calc(100vw - 32px); bottom: 16px; right: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Task<span>Fire</span></div>
  <div class="header-center">
    <div class="dot" id="notifDot"></div>
    <span id="notifLabel">Notifications off</span>
  </div>
  <div class="header-right">
    <button class="btn-outline" id="enableBtn" onclick="requestNotifications()">Enable Notifications</button>
  </div>
</header>

<!-- PWA Install Banner -->
<div id="installBanner">
  <span>⚡ Install TaskFire as a desktop app for background notifications</span>
  <div style="display:flex;gap:8px;">
    <button onclick="installPWA()">Install App</button>
    <button class="dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>

<div class="main">

  <!-- Add Task -->
  <div class="section-label">→ New Task</div>
  <div class="add-form">
    <div class="task-name-row">
      <div class="form-group">
        <label>Task</label>
        <input type="text" id="tName" placeholder="What needs to get done?" />
      </div>
      <button class="add-btn" onclick="addTask()">+ Add Task</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="tDate" />
      </div>
      <div class="form-group">
        <label>Due Time</label>
        <input type="time" id="tTime" />
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="tPriority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">⚪ Low</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" style="color:var(--accent)" id="sTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--text)" id="sActive">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--green)" id="sDone">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--red)" id="sOverdue">0</div>
      <div class="stat-label">Overdue</div>
    </div>
  </div>

  <!-- Task List Header -->
  <div class="tasks-header">
    <div class="section-label" style="margin:0">→ Tasks</div>
    <div class="right-controls">
      <div class="next-reminder" id="countdown"></div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter('all',this)">All</button>
        <button class="ftab" onclick="setFilter('active',this)">Active</button>
        <button class="ftab" onclick="setFilter('done',this)">Done</button>
      </div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="task-list" id="taskList"></div>
</div>

<!-- Toast Notification -->
<div id="toast">
  <div class="toast-header">
    <div class="toast-label" id="toastLabel">⚡ Reminder</div>
    <button class="toast-close" onclick="closeToast()">✕</button>
  </div>
  <div id="toastTasks"></div>
  <div class="toast-quote" id="toastQuote"><span class="toast-loading">Generating quote...</span></div>
  <div class="toast-author" id="toastAuthor"></div>
</div>

<script>
// ── STORAGE ────────────────────────────────────────────────────────────────
let tasks = [];
let filter = 'all';
let deferredInstallPrompt = null;
let nextFireAt = null;
let countdownTimer = null;
let reminderTimer = null;
const INTERVAL = 30 * 60 * 1000;

function load() {
  try { tasks = JSON.parse(localStorage.getItem('tf_tasks') || '[]'); } catch(e) { tasks = []; }
}
function save() { localStorage.setItem('tf_tasks', JSON.stringify(tasks)); }

// ── PWA INSTALL ────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!localStorage.getItem('tf_install_dismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});

function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => {
    deferredInstallPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
}

function dismissInstall() {
  localStorage.setItem('tf_install_dismissed', '1');
  document.getElementById('installBanner').classList.remove('show');
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// ── NOTIFICATIONS ──────────────────────────────────────────────────────────
function checkPermission() {
  if (Notification.permission === 'granted') activateNotifications();
}

function requestNotifications() {
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      activateNotifications();
      startLoop();
      // Fire first reminder after 3s so user knows it works
      setTimeout(fireReminder, 3000);
    }
  });
}

function activateNotifications() {
  document.getElementById('notifDot').className = 'dot active';
  document.getElementById('notifLabel').textContent = 'Notifications on';
  document.getElementById('enableBtn').classList.add('hidden');
}

function startLoop() {
  if (reminderTimer) clearInterval(reminderTimer);
  if (countdownTimer) clearInterval(countdownTimer);
  nextFireAt = Date.now() + INTERVAL;
  reminderTimer = setInterval(() => { nextFireAt = Date.now() + INTERVAL; fireReminder(); }, INTERVAL);
  countdownTimer = setInterval(tickCountdown, 1000);
}

function tickCountdown() {
  if (!nextFireAt) return;
  const diff = Math.max(0, nextFireAt - Date.now());
  const m = String(Math.floor(diff / 60000)).padStart(2,'0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  document.getElementById('countdown').innerHTML = `Next in <span>${m}:${s}</span>`;
}

async function fireReminder() {
  const pending = tasks.filter(t => !t.done);
  if (!pending.length) return;

  // Sort: high > medium > low, then by due date
  const sorted = [...pending].sort((a,b) => {
    const p = {high:0,medium:1,low:2};
    if (p[a.priority] !== p[b.priority]) return p[a.priority] - p[b.priority];
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    return 0;
  });

  const top = sorted.slice(0, 3);
  showToast(top, null);

  const quote = await getQuote(top[0]);
  updateToastQuote(quote);

  // Native desktop notification (fires even if tab is in background)
  if (Notification.permission === 'granted') {
    try {
      new Notification('⚡ TaskFire — ' + top.length + ' task' + (top.length > 1 ? 's' : '') + ' pending', {
        body: top.map(t => '• ' + t.name).join('\n'),
        icon: 'icon-192.png',
        tag: 'taskfire-reminder',
        requireInteraction: false,
        silent: false
      });
    } catch(e) {}
  }
}

function showToast(taskList, quote) {
  const toast = document.getElementById('toast');
  document.getElementById('toastLabel').textContent = '⚡ ' + taskList.length + ' TASK' + (taskList.length > 1 ? 'S' : '') + ' PENDING';

  document.getElementById('toastTasks').innerHTML = taskList.map(t => `
    <div class="toast-task">
      <div class="toast-task-name">${esc(t.name)}</div>
      <div class="toast-task-due">${t.dueDate ? fmtDate(t.dueDate) : 'No deadline'}${t.dueTime ? ' · ' + t.dueTime : ''} · ${t.priority}</div>
    </div>
  `).join('');

  document.getElementById('toastQuote').innerHTML = '<span class="toast-loading">Generating quote...</span>';
  document.getElementById('toastAuthor').textContent = '';

  toast.classList.add('visible');
  setTimeout(closeToast, 18000);
}

function updateToastQuote(quote) {
  document.getElementById('toastQuote').textContent = '\u201c' + quote.text + '\u201d';
  document.getElementById('toastAuthor').textContent = quote.author ? '— ' + quote.author : '';
}

function closeToast() {
  document.getElementById('toast').classList.remove('visible');
}

// ── CLAUDE API ─────────────────────────────────────────────────────────────
async function getQuote(task) {
  try {
    const res = await fetch('/.netlify/functions/quote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ taskName: task.name, priority: task.priority })
    });
    const data = await res.json();
    if (data.error) return { text: 'Stay locked in. Every task completed is progress.', author: 'TaskFire' };
    return { text: data.text, author: data.author };
  } catch(e) {
    return { text: 'Every hour of focused work compounds. Stay locked in.', author: 'TaskFire' };
  }
}

// ── TASKS ──────────────────────────────────────────────────────────────────
function addTask() {
  const name = document.getElementById('tName').value.trim();
  if (!name) { document.getElementById('tName').focus(); return; }
  tasks.unshift({
    id: Date.now().toString(),
    name,
    dueDate: document.getElementById('tDate').value,
    dueTime: document.getElementById('tTime').value,
    priority: document.getElementById('tPriority').value,
    done: false,
    created: new Date().toISOString()
  });
  save(); render();
  document.getElementById('tName').value = '';
  document.getElementById('tTime').value = '';
}

function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function del(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function isOverdue(t) {
  if (t.done || !t.dueDate) return false;
  const d = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59'));
  return d < new Date();
}

function render() {
  let list = tasks;
  if (filter === 'active') list = tasks.filter(t => !t.done);
  if (filter === 'done') list = tasks.filter(t => t.done);

  const el = document.getElementById('taskList');

  if (!list.length) {
    el.innerHTML = `<div class="empty"><span class="empty-big">ZERO</span><p>${filter === 'all' ? 'No tasks yet. Add one above.' : 'Nothing here.'}</p></div>`;
  } else {
    el.innerHTML = list.map(t => {
      const ov = isOverdue(t);
      const cls = t.done ? 'done' : ov ? 'overdue' : 'active';
      const due = t.dueDate ? fmtDate(t.dueDate) + (t.dueTime ? ' · ' + t.dueTime : '') : 'No deadline';
      return `<div class="task-item ${cls}">
        <div class="check-box ${t.done ? 'checked' : ''}" onclick="toggle('${t.id}')"></div>
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta">
            <span>📅 ${due}</span>
            ${ov && !t.done ? '<span style="color:var(--red)">⚠ Overdue</span>' : ''}
          </div>
        </div>
        <div class="task-actions">
          <span class="priority-tag ${t.priority}">${t.priority}</span>
          <button class="del-btn" onclick="del('${t.id}')" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // Stats
  const active = tasks.filter(t => !t.done).length;
  const done = tasks.filter(t => t.done).length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  document.getElementById('sTotal').textContent = tasks.length;
  document.getElementById('sActive').textContent = active;
  document.getElementById('sDone').textContent = done;
  document.getElementById('sOverdue').textContent = overdue;
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────
load();
document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
render();
checkPermission();
if (Notification.permission === 'granted') { startLoop(); setTimeout(fireReminder, 2000); }

document.getElementById('tName').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
